<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EV Battery AI Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

.card {
    border-radius: 15px;
    background: #ffffff;
    color: black;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

label {
    font-weight: 600;
    margin-top: 8px;
}

.btn {
    border-radius: 10px;
}

.result-box {
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container py-5">
    <h2 class="text-center mb-5">⚡ EV Battery Health & Charging Predictor</h2>

    <div class="row g-4">

        <!-- Degradation -->
        <div class="col-md-6">
            <div class="card p-4">
                <h4>📉 Degradation Rate</h4>

                <form action="/predict_degradation" method="POST">

                    <label>SOC (%)</label>
                    <input type="number" step="any" name="soc" class="form-control"
                        value="{{ form_data_degradation['soc'] if form_data_degradation else 43.709 }}">

                    <label>Current (A)</label>
                    <input type="number" step="any" name="current" class="form-control"
                        value="{{ form_data_degradation['current'] if form_data_degradation else 33.554 }}">

                    <label>Voltage (V)</label>
                    <input type="number" step="any" name="voltage" class="form-control"
                        value="{{ form_data_degradation['voltage'] if form_data_degradation else 3.63 }}">

                    <label>Battery Temperature (°C)</label>
                    <input type="number" step="any" name="battery temp" class="form-control"
                        value="{{ form_data_degradation['battery temp'] if form_data_degradation else 33.454 }}">

                    <label>Ambient Temperature (°C)</label>
                    <input type="number" step="any" name="ambient temp" class="form-control"
                        value="{{ form_data_degradation['ambient temp'] if form_data_degradation else 26.44 }}">

                    <label>Charging Cycles</label>
                    <input type="number" name="charging cycles" class="form-control"
                        value="{{ form_data_degradation['charging cycles'] if form_data_degradation else 112 }}">

                    <label>Battery Type</label>
                    <select name="battery type encoded" class="form-control mb-3">
                        <option value="0">Li-ion</option>
                        <option value="1">LiFePO₄</option>
                    </select>

                    <button class="btn btn-primary w-100">Predict Degradation</button>
                </form>

                {% if result_degradation %}
                <div class="alert alert-success mt-3 result-box text-center">
                    {{ result_degradation }}
                </div>
                {% endif %}
            </div>
        </div>

        <!-- Charging -->
        <div class="col-md-6">
            <div class="card p-4">
                <h4>⚡ Charging Time</h4>

                <form action="/predict_charging" method="POST">

                    <label>SOC (%)</label>
                    <input type="number" step="any" name="soc" class="form-control"
                        value="{{ form_data_charging['soc'] if form_data_charging else 95.564 }}">

                    <label>Voltage (V)</label>
                    <input type="number" step="any" name="voltage" class="form-control"
                        value="{{ form_data_charging['voltage'] if form_data_charging else 3.879 }}">

                    <label>Current (A)</label>
                    <input type="number" step="any" name="current" class="form-control"
                        value="{{ form_data_charging['current'] if form_data_charging else 32.228 }}">

                    <label>Battery Temperature (°C)</label>
                    <input type="number" step="any" name="battery temp" class="form-control"
                        value="{{ form_data_charging['battery temp'] if form_data_charging else 35.934 }}">

                    <label>Ambient Temperature (°C)</label>
                    <input type="number" step="any" name="ambient temp" class="form-control"
                        value="{{ form_data_charging['ambient temp'] if form_data_charging else 31.109 }}">

                    <label>Battery Type</label>
                    <select name="battery type" class="form-control">
                        <option value="0">Li-ion</option>
                        <option value="1">LiFePO₄</option>
                    </select>

                    <label>Degradation Rate (%)</label>
                    <input type="number" step="any" name="degradation rate" class="form-control mb-3"
                        value="{{ form_data_charging['degradation rate'] if form_data_charging else 12.187 }}">

                    <button class="btn btn-success w-100">Predict Charging Time</button>
                </form>

                {% if result_charging %}
                <div class="alert alert-info mt-3 result-box text-center">
                    {{ result_charging }}
                </div>
                {% endif %}
            </div>
        </div>

    </div>

    <!-- CLEAR BUTTON -->
    <div class="text-center mt-4">
        <button class="btn btn-danger" onclick="clearAll()">🧹 Clear All</button>
    </div>

</div>

<script>
function clearAll() {
    window.location.href = "/clear";
}
</script>

</body>
</html>
